<!DOCTYPE html>
<html>
<head>
    <title>Loan Approval Prediction</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Loan Approval Prediction</h1>

    <form>
        <label>Gender</label>
        <select>
            <option>Male</option>
            <option>Female</option>
        </select>

        <label>Married</label>
        <select>
            <option>Yes</option>
            <option>No</option>
        </select>

        <label>Education</label>
        <select>
            <option>Graduate</option>
            <option>Not Graduate</option>
        </select>

        <label>Applicant Income</label>
        <input type="number" placeholder="Enter Income">

        <label>Loan Amount</label>
        <input type="number" placeholder="Enter Loan Amount">

        <label>Credit History</label>
        <select>
            <option>Good (1)</option>
            <option>Bad (0)</option>
        </select>

        <label>Property Area</label>
        <select>
            <option>Urban</option>
            <option>Semiurban</option>
            <option>Rural</option>
        </select>

        <button type="submit">Predict Loan Status</button>
    </form>

    <div class="result">
        Loan Status: Approved
    </div>
</div>

</body>
</html>
